name: Build and release tunn3l CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Build binaries
        working-directory: cli
        run: |
          bun build bore.js --compile --target=bun-darwin-arm64 --outfile tunn3l-darwin-arm64
          bun build bore.js --compile --target=bun-darwin-x64 --outfile tunn3l-darwin-x64
          bun build bore.js --compile --target=bun-linux-arm64 --outfile tunn3l-linux-arm64
          bun build bore.js --compile --target=bun-linux-x64 --outfile tunn3l-linux-x64

      - name: Compress binaries
        working-directory: cli
        run: gzip -k tunn3l-darwin-arm64 tunn3l-darwin-x64 tunn3l-linux-arm64 tunn3l-linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/tunn3l-*.gz
